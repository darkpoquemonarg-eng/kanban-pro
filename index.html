<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kanban Corporativo PRO</title>

<!-- ✅ SCRIPTS CORRECTOS -->
https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js>
https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js
https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.jsscript>
https://cdn.jsdelivr.net/npm/chart.jsscript>

<style>
body{font-family:Segoe UI;background:#eef1f5;padding:15px}
h2{text-align:center}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.col{background:white;padding:10px;border-radius:10px;min-height:250px}

.card{
 background:#fafafa;
 padding:8px;
 margin-bottom:6px;
 border-radius:6px;
 cursor:grab;
}

button{
 margin-top:5px;
 font-size:12px;
 cursor:pointer;
}

.dashboard{display:flex;gap:20px;flex-wrap:wrap}

.chart-box{
 width:320px;
 height:250px;
 background:white;
 padding:10px;
 border-radius:10px;
 box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h2>🚀 Kanban Corporativo PRO</h2>

<input id="tarea" placeholder="Nueva tarea">

<select id="prioridad">
<option>Alta</option>
<option selected>Media</option>
<option>Baja</option>
</select>

<select id="responsable">
<option>Abel</option>
<option>Karla</option>
<option>Luis</option>
<option>Los 3</option>
<option>Abel y Karla</option>
<option>Luis y Abel</option>
<option>Luis y Karla</option>
</select>

<button onclick="crear()">Agregar</button>

<br><br>

<button onclick="exportHistorial()">📥 Movimientos</button>
<button onclick="exportActividades()">📊 Actividades</button>

<div class="dashboard">
  <div class="chart-box"><canvas id="c1"></canvas></div>
  <div class="chart-box"><canvas id="c2"></canvas></div>
  <div class="chart-box"><canvas id="c3"></canvas></div>
  <div class="chart-box"><canvas id="c4"></canvas></div>
  <div class="chart-box"><canvas id="c5"></canvas></div>
</div>

<div id="board" class="board"></div>

<h3>Historial</h3>
<ul id="hist"></ul>

<script>

const config={
 apiKey:"TU_API_KEY",
 authDomain:"tablero-kamban.firebaseapp.com",
 projectId:"tablero-kamban"
};

firebase.initializeApp(config);
const db=firebase.firestore();

const COLS=["Pendiente","Proceso","Revision","Terminado"];

let cards=[], dragId=null;
let ch1,ch2,ch3,ch4,ch5;

// 🔄 realtime
db.collection("kanban").onSnapshot(s=>{
 cards=[];
 s.forEach(d=>{
   let data=d.data();

   cards.push({
     id:d.id,
     text:data.text,
     prioridad:data.prioridad || "Media",
     responsable:data.responsable || "Sin asignar",
     col:data.col ?? 0
   });
 });
 render();
});

// historial
db.collection("historial").orderBy("fecha","desc").onSnapshot(s=>{
 let h=document.getElementById("hist");
 h.innerHTML="";
 s.forEach(d=>{
  let x=d.data();
  h.innerHTML+=`<li>${x.action} - ${x.text}</li>`;
 });
});

// crear
function crear(){
 let t=document.getElementById("tarea").value;
 let p=document.getElementById("prioridad").value;
 let r=document.getElementById("responsable").value;

 if(!t)return;

 db.collection("kanban").add({
  text:t,
  prioridad:p,
  responsable:r,
  col:0,
  order:Date.now()
 });

 db.collection("actividades").add({
  text:t,
  prioridad:p,
  responsable:r,
  fecha:new Date()
 });

 log(t,"Creado");
 document.getElementById("tarea").value="";
}

// editar
function editar(id,texto,prioridad,responsable){
 let nuevoTexto=prompt("Editar tarea",texto);
 if(!nuevoTexto)return;

 let nuevaPrioridad=prompt("Prioridad (Alta, Media, Baja)",prioridad);
 if(!nuevaPrioridad)return;

 let nuevoResp=prompt("Responsable",responsable);
 if(!nuevoResp)return;

 db.collection("kanban").doc(id).update({
  text:nuevoTexto,
  prioridad:nuevaPrioridad,
  responsable:nuevoResp
 });

 log(nuevoTexto,"Editado");
}

// eliminar
function eliminar(id){
 if(!confirm("¿Eliminar tarea?"))return;

 db.collection("kanban").doc(id).delete();
 log("Tarea","Eliminada");
}

// drag
function drag(id){dragId=id}

// render
function render(){

 let b=document.getElementById("board");
 b.innerHTML="";

 COLS.forEach((c,i)=>{

 let col=document.createElement("div");
 col.className="col";

 col.ondragover=e=>e.preventDefault();

 col.ondrop=()=>{
  if(dragId){
   db.collection("kanban").doc(dragId).update({col:i});
   log("Movimiento","Cambio columna");
   dragId=null;
  }
 };

 col.innerHTML=`<h3>${c}</h3>`;

 cards.filter(x=>x.col===i).forEach(x=>{

 col.innerHTML+=`
 <div class="card"
 draggable="true"
 ondragstart="drag('${x.id}')"
 style="border-left:5px solid ${
  x.prioridad==='Alta'?'red':
  x.prioridad==='Media'?'orange':'green'
 }">

 <b>${x.text}</b><br>
 👤 ${x.responsable}<br>
 ⚡ ${x.prioridad}

 <br>
 <button onclick="editar('${x.id}','${x.text}','${x.prioridad}','${x.responsable}')">✏️</button>
 <button onclick="eliminar('${x.id}')">🗑️</button>

 </div>
 `;
 });

 b.appendChild(col);
 });

 dashboard();
}

function dashboard(){

 let alta=cards.filter(x=>x.prioridad==="Alta").length;
 let media=cards.filter(x=>x.prioridad==="Media").length;
 let baja=cards.filter(x=>x.prioridad==="Baja").length;

 let p=cards.filter(x=>x.col===0).length;
 let pr=cards.filter(x=>x.col===1).length;
 let r=cards.filter(x=>x.col===2).length;
 let t=cards.filter(x=>x.col===3).length;

 // Prioridad
 if(ch1)ch1.destroy();
 ch1=new Chart(c1,{type:"pie",
 data:{labels:["Alta","Media","Baja"],
 datasets:[{data:[alta,media,baja],backgroundColor:["red","orange","green"]}]} });

 // Estado
 if(ch2)ch2.destroy();
 ch2=new Chart(c2,{type:"bar",
 data:{labels:COLS,
 datasets:[{data:[p,pr,r,t],backgroundColor:"#0078D4"}]} });

 // Productividad
 let prod={};
 cards.forEach(x=>{
  if(x.col===3){
   prod[x.responsable]=(prod[x.responsable]||0)+1;
  }
 });

 if(ch3)ch3.destroy();
 ch3=new Chart(c3,{
  type:"bar",
  data:{
   labels:Object.keys(prod),
   datasets:[{data:Object.values(prod),backgroundColor:"#2ecc71"}]
  }
 });

 // Flujo
 if(ch4)ch4.destroy();
 ch4=new Chart(c4,{
  type:"line",
  data:{labels:COLS,
   datasets:[{data:[p,pr,r,t],borderColor:"#9b59b6"}]}
 });

 // Responsable vs prioridad
 let resp={};

 cards.forEach(x=>{
  if(!resp[x.responsable]){
    resp[x.responsable]={Alta:0,Media:0,Baja:0};
  }
  resp[x.responsable][x.prioridad]++;
 });

 let labels=Object.keys(resp);

 if(ch5)ch5.destroy();
 ch5=new Chart(c5,{
  type:"bar",
  data:{
   labels:labels,
   datasets:[
    {label:"Alta",data:labels.map(r=>resp[r].Alta),backgroundColor:"red"},
    {label:"Media",data:labels.map(r=>resp[r].Media),backgroundColor:"orange"},
    {label:"Baja",data:labels.map(r=>resp[r].Baja),backgroundColor:"green"}
   ]
  }
 });
}

function log(t,a){
 db.collection("historial").add({text:t,action:a,fecha:new Date()});
}

// export
function exportHistorial(){
 db.collection("historial").get().then(s=>{
  let data=[["Acción","Detalle","Fecha"]];
  s.forEach(d=>{
   let x=d.data();
   data.push([x.action,x.text,new Date(x.fecha.seconds*1000)]);
  });
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data),"Hist");
  XLSX.writeFile(wb,"Historial.xlsx");
 });
}

function exportActividades(){
 db.collection("actividades").get().then(s=>{
  let data=[["Tarea","Prioridad","Responsable","Fecha"]];
  s.forEach(d=>{
   let x=d.data();
   data.push([x.text,x.prioridad,x.responsable,new Date(x.fecha.seconds*1000)]);
  });
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(data),"Act");
  XLSX.writeFile(wb,"Actividades.xlsx");
 });
}

</script>
</body>
</html>
