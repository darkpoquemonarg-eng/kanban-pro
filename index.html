<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kanban PRO</title>

<!-- ✅ SCRIPTS CORRECTOS -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef1f5;padding:15px}
h2{text-align:center}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.col{background:white;padding:10px;border-radius:10px;min-height:250px}

.card{
 background:#fafafa;
 padding:8px;
 margin:6px;
 border-radius:6px;
 cursor:grab;
}

.dashboard{display:flex;gap:15px;flex-wrap:wrap}

.chart-box{
 width:300px;height:220px;
 background:white;padding:10px;border-radius:10px
}

button{margin:3px}
</style>
</head>

<body>

<h2>🚀 Kanban PRO</h2>

<input id="tarea" placeholder="Nueva tarea">
<select id="prioridad">
<option>Alta</option><option selected>Media</option><option>Baja</option>
</select>

<select id="responsable">
<option>Abel</option><option>Karla</option><option>Luis</option>
</select>

<button onclick="crear()">Agregar</button>

<!-- DASHBOARD -->
<div class="dashboard">
 <div class="chart-box"><canvas id="c1"></canvas></div>
 <div class="chart-box"><canvas id="c2"></canvas></div>
 <div class="chart-box"><canvas id="c3"></canvas></div>
 <div class="chart-box"><canvas id="c4"></canvas></div>
 <div class="chart-box"><canvas id="c5"></canvas></div>
</div>

<div id="board" class="board"></div>

<script>

// ✅ FIREBASE
const config={
 apiKey:"AIzaSyASsFAKZ5t1YUylzLfQVuDtpzAWnAsCS8g",
 authDomain:"tablero-kamban.firebaseapp.com",
 projectId:"tablero-kamban"
};

firebase.initializeApp(config);
const db=firebase.firestore();

const COLS=["Pendiente","Proceso","Revision","Terminado"];

let cards=[],dragId=null;
let ch1,ch2,ch3,ch4,ch5;

// realtime
db.collection("kanban").onSnapshot(s=>{
 cards=[];
 s.forEach(d=>{
  let x=d.data();

  cards.push({
   id:d.id,
   text:x.text || "Tarea",
   prioridad:x.prioridad || "Media",
   responsable:x.responsable || "Sin asignar",
   col:x.col ?? 0
  });
 });

 render();
});

// crear
function crear(){
 if(!tarea.value)return;

 db.collection("kanban").add({
  text:tarea.value,
  prioridad:prioridad.value,
  responsable:responsable.value,
  col:0
 });

 tarea.value="";
}

// editar
function editar(id,t,p,r){
 let nt=prompt("Editar tarea",t);
 if(!nt)return;

 db.collection("kanban").doc(id).update({
  text:nt
 });
}

// eliminar
function eliminar(id){
 if(confirm("Eliminar?")){
  db.collection("kanban").doc(id).delete();
 }
}

// drag
function drag(id){dragId=id}

// render
function render(){

 board.innerHTML="";

 COLS.forEach((c,i)=>{
 let col=document.createElement("div");
 col.className="col";

 col.ondragover=e=>e.preventDefault();

 col.ondrop=()=>{
  if(dragId){
   db.collection("kanban").doc(dragId).update({col:i});
   dragId=null;
  }
 };

 col.innerHTML=`<h3>${c}</h3>`;

 cards.filter(x=>x.col===i).forEach(x=>{
 col.innerHTML+=`
 <div class="card"
 draggable="true"
 ondragstart="drag('${x.id}')">

 ${x.text}<br>
 ${x.responsable}<br>
 ${x.prioridad}

 <button onclick="editar('${x.id}','${x.text}','${x.prioridad}','${x.responsable}')">✏️</button>
 <button onclick="eliminar('${x.id}')">🗑️</button>

 </div>`;
 });

 board.appendChild(col);
 });

 dashboard();
}

// dashboard
function dashboard(){

 let alta = cards.filter(x=>x.prioridad==="Alta").length;
 let media = cards.filter(x=>x.prioridad==="Media").length;
 let baja = cards.filter(x=>x.prioridad==="Baja").length;

 let p = cards.filter(x=>x.col===0).length;
 let pr = cards.filter(x=>x.col===1).length;
 let r = cards.filter(x=>x.col===2).length;
 let t = cards.filter(x=>x.col===3).length;

 // prioridad
 if(ch1)ch1.destroy();
 ch1=new Chart(c1,{
  type:"pie",
  data:{labels:["Alta","Media","Baja"],
  datasets:[{data:[alta,media,baja]}]}
 });

 // estado
 if(ch2)ch2.destroy();
 ch2=new Chart(c2,{
  type:"bar",
  data:{labels:COLS,
  datasets:[{data:[p,pr,r,t]}]}
 });

 // productividad
 let prod={};
 cards.forEach(x=>{
  if(x.col===3){
   prod[x.responsable]=(prod[x.responsable]||0)+1;
  }
 });

 if(ch3)ch3.destroy();
 ch3=new Chart(c3,{
  type:"bar",
  data:{labels:Object.keys(prod),
  datasets:[{data:Object.values(prod)}]}
 });

 // flujo
 if(ch4)ch4.destroy();
 ch4=new Chart(c4,{
  type:"line",
  data:{labels:COLS,
  datasets:[{data:[p,pr,r,t]}]}
 });

 // responsable vs prioridad
 let resp={};
 cards.forEach(x=>{
  if(!resp[x.responsable]){
    resp[x.responsable]={Alta:0,Media:0,Baja:0};
  }
  resp[x.responsable][x.prioridad]++;
 });

 let labels=Object.keys(resp);

 if(ch5)ch5.destroy();
 ch5=new Chart(c5,{
  type:"bar",
  data:{
   labels:labels,
   datasets:[
    {label:"Alta",data:labels.map(r=>resp[r].Alta)},
    {label:"Media",data:labels.map(r=>resp[r].Media)},
    {label:"Baja",data:labels.map(r=>resp[r].Baja)}
   ]
  }
 });

}

</script>
</body>
</html>
