<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kanban PRO Ejecutivo</title>

<!-- ✅ SCRIPTS CORRECTOS -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Segoe UI;background:#eef1f5;padding:15px}
h2{text-align:center}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.col{background:white;padding:10px;border-radius:10px}

.card{
 background:#fff;
 padding:10px;
 margin:8px;
 border-radius:8px;
 box-shadow:0 2px 5px rgba(0,0,0,0.1);
 cursor:grab;
}

.dashboard{display:flex;gap:15px;flex-wrap:wrap}

.chart-box{
 width:300px;height:220px;
 background:white;padding:10px;border-radius:10px
}

button{margin:3px}
</style>
</head>

<body>

<h2>🚀 Kanban PRO Ejecutivo</h2>

<input id="tarea" placeholder="Nueva tarea">

<select id="prioridad">
<option>Alta</option>
<option selected>Media</option>
<option>Baja</option>
</select>

<select id="responsable">
<option>Abel</option>
<option>Karla</option>
<option>Luis</option>
</select>

<button onclick="crear()">Agregar</button>
<button onclick="exportExcel()">📥 Excel</button>
<button onclick="exportReportePro()">📊 Reporte Ejecutivo</button>

<!-- DASHBOARD -->
<div class="dashboard">
 <div class="chart-box"><canvas id="c1"></canvas></div>
 <div class="chart-box"><canvas id="c2"></canvas></div>
 <div class="chart-box"><canvas id="c3"></canvas></div>
 <div class="chart-box"><canvas id="c4"></canvas></div>
 <div class="chart-box"><canvas id="c5"></canvas></div>
</div>

<div id="board" class="board"></div>

<script>

// ✅ FIREBASE
const config={
 apiKey:"AIzaSyASsFAKZ5t1YUylzLfQVuDtpzAWnAsCS8g",
 authDomain:"tablero-kamban.firebaseapp.com",
 projectId:"tablero-kamban"
};

firebase.initializeApp(config);
const db=firebase.firestore();

const COLS=["Pendiente","Proceso","Revision","Terminado"];

let cards=[],dragId=null;
let ch1,ch2,ch3,ch4,ch5;

// 🔄 realtime
db.collection("kanban").onSnapshot(s=>{
 cards=[];
 s.forEach(d=>{
  let x=d.data();
  cards.push({
   id:d.id,
   text:x.text || "Tarea",
   prioridad:x.prioridad || "Media",
   responsable:x.responsable || "Sin asignar",
   col:x.col ?? 0
  });
 });
 render();
});

// ✅ crear
function crear(){
 if(!tarea.value)return;

 db.collection("kanban").add({
  text:tarea.value,
  prioridad:prioridad.value,
  responsable:responsable.value,
  col:0
 });

 tarea.value="";
}

// ✏️ editar
function editar(id,t){
 let nt=prompt("Editar",t);
 if(!nt)return;
 db.collection("kanban").doc(id).update({text:nt});
}

// 🗑 eliminar
function eliminar(id){
 if(confirm("Eliminar?")){
  db.collection("kanban").doc(id).delete();
 }
}

// drag
function drag(id){dragId=id}

// render
function render(){

 board.innerHTML="";

 COLS.forEach((c,i)=>{
 let col=document.createElement("div");
 col.className="col";

 col.ondragover=e=>e.preventDefault();
 col.ondrop=()=>{
  if(dragId){
   db.collection("kanban").doc(dragId).update({col:i});
   dragId=null;
  }
 };

 col.innerHTML=`<h3>${c}</h3>`;

 cards.filter(x=>x.col===i).forEach(x=>{

 let color =
  x.prioridad==="Alta"?"#e74c3c":
  x.prioridad==="Media"?"#f1c40f":
  "#2ecc71";

 let icono =
  x.prioridad==="Alta"?"🔥":
  x.prioridad==="Media"?"⚠️":
  "✅";

 col.innerHTML+=`
 <div class="card"
 draggable="true"
 ondragstart="drag('${x.id}')"
 style="border-left:6px solid ${color}">

 <b>${icono} ${x.text}</b><br>
 👤 ${x.responsable}<br>
 🎯 ${x.prioridad}

 <br>
 <button onclick="editar('${x.id}','${x.text}')">✏️</button>
 <button onclick="eliminar('${x.id}')">🗑️</button>
 </div>`;
 });

 board.appendChild(col);
 });

 dashboard();
}

// 📊 dashboard
function dashboard(){

 let alta=cards.filter(x=>x.prioridad==="Alta").length;
 let media=cards.filter(x=>x.prioridad==="Media").length;
 let baja=cards.filter(x=>x.prioridad==="Baja").length;

 let p=cards.filter(x=>x.col===0).length;
 let pr=cards.filter(x=>x.col===1).length;
 let r=cards.filter(x=>x.col===2).length;
 let t=cards.filter(x=>x.col===3).length;

 if(ch1)ch1.destroy();
 ch1=new Chart(c1,{
  type:"pie",
  data:{
   labels:["Alta","Media","Baja"],
   datasets:[{
    label:"Tareas",
    data:[alta,media,baja],
    backgroundColor:["#e74c3c","#f1c40f","#2ecc71"]
   }]
  }
 });

 if(ch2)ch2.destroy();
 ch2=new Chart(c2,{
  type:"bar",
  data:{
   labels:COLS,
   datasets:[{
    label:"Tareas",
    data:[p,pr,r,t]
   }]
  }
 });

 let prod={};
 cards.forEach(x=>{
  if(x.col===3){
   prod[x.responsable]=(prod[x.responsable]||0)+1;
  }
 });

 if(ch3)ch3.destroy();
 ch3=new Chart(c3,{
  type:"bar",
  data:{
   labels:Object.keys(prod),
   datasets:[{
    label:"Tareas completadas",
    data:Object.values(prod)
   }]
  }
 });

 if(ch4)ch4.destroy();
 ch4=new Chart(c4,{
  type:"line",
  data:{
   labels:COLS,
   datasets:[{
    label:"Flujo de tareas",
    data:[p,pr,r,t]
   }]
  }
 });

 let resp={};
 cards.forEach(x=>{
  if(!resp[x.responsable]){
   resp[x.responsable]={Alta:0,Media:0,Baja:0};
  }
  resp[x.responsable][x.prioridad]++;
 });

 let labels=Object.keys(resp);

 if(ch5)ch5.destroy();
 ch5=new Chart(c5,{
  type:"bar",
  data:{
   labels:labels,
   datasets:[
    {label:"Alta",data:labels.map(r=>resp[r].Alta),backgroundColor:"#e74c3c"},
    {label:"Media",data:labels.map(r=>resp[r].Media),backgroundColor:"#f1c40f"},
    {label:"Baja",data:labels.map(r=>resp[r].Baja),backgroundColor:"#2ecc71"}
   ]
  }
 });
}

// 📥 EXCEL
function exportExcel(){

 let data=[["Tarea","Responsable","Prioridad","Estado"]];

 cards.forEach(x=>{
  data.push([x.text,x.responsable,x.prioridad,COLS[x.col]]);
 });

 let ws=XLSX.utils.aoa_to_sheet(data);
 let wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Kanban");

 XLSX.writeFile(wb,"Tareas.xlsx");
}

// 📊 REPORTE PRO
async function exportReportePro(){

 const { jsPDF } = window.jspdf;
 const pdf = new jsPDF();

 let fecha = new Date().toLocaleDateString();

 let total = cards.length;
 let terminadas = cards.filter(x=>x.col===3).length;
 let proceso = cards.filter(x=>x.col===1).length;

 let eficiencia = total? (terminadas/total*100).toFixed(1):0;

 pdf.setFontSize(18);
 pdf.text("REPORTE EJECUTIVO KANBAN",20,20);

 pdf.setFontSize(11);
 pdf.text("Fecha: "+fecha,20,30);

 pdf.text("Total tareas: "+total,20,50);
 pdf.text("Terminadas: "+terminadas,20,60);
 pdf.text("% Eficiencia: "+eficiencia+"%",20,70);
 pdf.text("En proceso: "+proceso,20,80);

 let charts=["c1","c2","c3","c4","c5"];

 for(let i=0;i<charts.length;i++){

  let canvas=document.getElementById(charts[i]);
  let img=canvas.toDataURL("image/png");

  pdf.addPage();
  pdf.text("Grafica "+(i+1),20,15);
  pdf.addImage(img,"PNG",10,25,180,110);
 }

 pdf.save("Reporte_Ejecutivo.pdf");
}

</script>

</body>
</html>
``
