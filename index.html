<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kanban Corporativo PRO</title>

<!-- ✅ SCRIPTS BIEN PUESTOS -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef1f5;padding:15px}
h2{text-align:center}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.col{background:white;padding:10px;border-radius:10px;min-height:250px}

.card{background:#fafafa;padding:8px;margin:6px;border-radius:6px}
button{margin:3px}

.chart-box{
 width:300px;height:220px;
 background:white;border-radius:10px;padding:10px
}

.dashboard{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>

<body>

<h2>🚀 Kanban Corporativo PRO</h2>

<!-- LOGIN -->
<div id="loginBox">
 <input id="email" placeholder="Email"><br><br>
 <input id="pass" type="password" placeholder="Password"><br><br>
 <button onclick="login()">Entrar</button>
 <button onclick="register()">Registrar</button>
</div>

<button id="logoutBtn" onclick="logout()" style="display:none">Salir</button>

<br><br>

<input id="tarea" placeholder="Nueva tarea">

<select id="prioridad">
<option>Alta</option>
<option>Media</option>
<option>Baja</option>
</select>

<select id="responsable">
<option>Abel</option>
<option>Karla</option>
<option>Luis</option>
</select>

<button onclick="crear()">Agregar</button>
<button onclick="limpiarBase()">🧹 Limpiar</button>

<!-- KPI -->
<h3>KPI</h3>
<p id="k1"></p>
<p id="k2"></p>

<div class="dashboard">
 <div class="chart-box"><canvas id="c1"></canvas></div>
 <div class="chart-box"><canvas id="c2"></canvas></div>
</div>

<div id="board"></div>

<script>

// ✅ FIREBASE
const config={
 apiKey:"AIzaSyASsFAKZ5t1YUylzLfQVuDtpzAWnAsCS8g",
 authDomain:"tablero-kamban.firebaseapp.com",
 projectId:"tablero-kamban"
};

firebase.initializeApp(config);
const db=firebase.firestore();
const auth=firebase.auth();

let cards=[];

// LOGIN
auth.onAuthStateChanged(user=>{
 if(user){
  loginBox.style.display="none";
  logoutBtn.style.display="block";
  load();
 }else{
  loginBox.style.display="block";
  logoutBtn.style.display="none";
 }
});

function login(){auth.signInWithEmailAndPassword(email.value,pass.value);}
function register(){auth.createUserWithEmailAndPassword(email.value,pass.value);}
function logout(){auth.signOut();}

// CLEAN
function limpiarBase(){
 db.collection("kanban").get().then(s=>{
  s.forEach(d=>{
   let x=d.data();
   db.collection("kanban").doc(d.id).update({
    text:x.text||"Tarea",
    prioridad:x.prioridad||"Media",
    responsable:x.responsable||"Sin asignar",
    col:x.col??0
   });
  });
  alert("Limpio ✅");
 });
}

// LOAD
function load(){
 db.collection("kanban").onSnapshot(s=>{
  cards=[];
  s.forEach(d=>{
   let x=d.data();
   cards.push({
    id:d.id,
    text:x.text||"Tarea",
    prioridad:x.prioridad||"Media",
    responsable:x.responsable||"Sin asignar",
    col:x.col??0
   });
  });
  render();
 });
}

// CRUD
function crear(){
 if(!tarea.value)return;
 db.collection("kanban").add({
  text:tarea.value,
  prioridad:prioridad.value,
  responsable:responsable.value,
  col:0
 });
 tarea.value="";
}

function eliminar(id){
 if(confirm("Eliminar?")){
  db.collection("kanban").doc(id).delete();
 }
}

// RENDER
function render(){

 board.innerHTML="";
 let cols=["Pendiente","Proceso","Revision","Terminado"];

 cols.forEach((c,i)=>{
 let col=document.createElement("div");
 col.innerHTML="<b>"+c+"</b>";

 cards.filter(x=>x.col===i).forEach(x=>{
 col.innerHTML+=`
 <div class='card'>
 ${x.text}<br>
 ${x.responsable}<br>
 ${x.prioridad}
 <button onclick="eliminar('${x.id}')">X</button>
 </div>`;
 });

 board.appendChild(col);
 });

 dashboard();
}

// DASHBOARD
function dashboard(){

 let total=cards.length;
 let fin=cards.filter(x=>x.col===3).length;

 k1.innerText="Total tareas: "+total;
 k2.innerText="% terminadas: "+(total?(fin/total*100).toFixed(1):0)+"%";

 new Chart(c1,{
  type:"pie",
  data:{
   labels:["Alta","Media","Baja"],
   datasets:[{
    data:[
     cards.filter(x=>x.prioridad=="Alta").length,
     cards.filter(x=>x.prioridad=="Media").length,
     cards.filter(x=>x.prioridad=="Baja").length
    ]
   }]
  }
 });

}

</script>

</body>
</html>
