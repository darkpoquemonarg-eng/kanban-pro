<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kanban Corporativo PRO</title>

<!-- ✅ SCRIPTS CORRECTOS -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef1f5;padding:15px}
h2{text-align:center}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.col{background:white;padding:10px;border-radius:10px;min-height:250px}

.card{
 background:#fafafa;
 padding:8px;
 margin-bottom:6px;
 border-radius:6px;
 cursor:grab;
}

button{margin:3px;font-size:12px;cursor:pointer}

.dashboard{display:flex;gap:20px;flex-wrap:wrap}
.chart-box{
 width:320px;height:250px;background:white;
 padding:10px;border-radius:10px;
 box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

#kpiBox{
 margin-top:15px;background:white;padding:10px;border-radius:10px
}
</style>
</head>

<body>

<h2>🚀 Kanban Corporativo PRO</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Registrar</button>
</div>

<button id="logoutBtn" onclick="logout()" style="display:none">Cerrar sesión</button>

<br><br>

<input id="tarea" placeholder="Nueva tarea">

<select id="prioridad">
<option>Alta</option>
<option selected>Media</option>
<option>Baja</option>
</select>

<select id="responsable">
<option>Abel</option>
<option>Karla</option>
<option>Luis</option>
</select>

<button onclick="crear()">Agregar</button>
<button onclick="limpiarBase()">🧹 Limpiar datos</button>

<!-- KPI -->
<div id="kpiBox">
 <h3>KPI Calidad</h3>
 <p id="kpi1"></p>
 <p id="kpi2"></p>
 <p id="kpi3"></p>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
 <div class="chart-box"><canvas id="c1"></canvas></div>
 <div class="chart-box"><canvas id="c2"></canvas></div>
 <div class="chart-box"><canvas id="c3"></canvas></div>
 <div class="chart-box"><canvas id="c4"></canvas></div>
 <div class="chart-box"><canvas id="c5"></canvas></div>
</div>

<div id="board" class="board"></div>

<script>

// 🔥 FIREBASE
const config={
 apiKey:"AIzaSyASsFAKZ5t1YUylzLfQVuDtpzAWnAsCS8g",
 authDomain:"tablero-kamban.firebaseapp.com",
 projectId:"tablero-kamban"
};

firebase.initializeApp(config);
const db=firebase.firestore();
const auth=firebase.auth();

const COLS=["Pendiente","Proceso","Revision","Terminado"];

let cards=[], dragId=null;
let ch1,ch2,ch3,ch4,ch5;

// 🔐 AUTH
auth.onAuthStateChanged(user=>{
 if(user){
  loginBox.style.display="none";
  logoutBtn.style.display="block";
  cargarDatos();
 }else{
  loginBox.style.display="block";
  logoutBtn.style.display="none";
  board.innerHTML="";
 }
});

function register(){
 auth.createUserWithEmailAndPassword(email.value,pass.value)
 .then(()=>alert("Usuario creado"))
 .catch(e=>alert(e.message));
}

function login(){
 auth.signInWithEmailAndPassword(email.value,pass.value)
 .catch(e=>alert(e.message));
}

function logout(){auth.signOut();}

// ✅ LIMPIAR BASE
function limpiarBase(){
 db.collection("kanban").get().then(s=>{
  s.forEach(doc=>{
   let d=doc.data();
   db.collection("kanban").doc(doc.id).update({
    text:d.text||"Tarea sin nombre",
    prioridad:d.prioridad||"Media",
    responsable:d.responsable||"Sin asignar",
    col:d.col??0
   });
  });
  alert("Base limpiada ✅");
 });
}

// realtime
function cargarDatos(){
 db.collection("kanban").onSnapshot(s=>{
  cards=[];
  s.forEach(d=>{
   let data=d.data();
   cards.push({
    id:d.id,
    text:data.text||"Tarea",
    prioridad:data.prioridad||"Media",
    responsable:data.responsable||"Sin asignar",
    col:data.col??0
   });
  });
  render();
 });
}

// CRUD
function crear(){
 if(!tarea.value||!responsable.value){
  alert("Completa los campos"); return;
 }

 db.collection("kanban").add({
  text:tarea.value,
  prioridad:prioridad.value,
  responsable:responsable.value,
  col:0
 });

 tarea.value="";
}

function editar(id,t,p,r){
 let nt=prompt("Editar",t); if(!nt)return;
 db.collection("kanban").doc(id).update({text:nt});
}

function eliminar(id){
 if(confirm("Eliminar?")){
  db.collection("kanban").doc(id).delete();
 }
}

// UI
function drag(id){dragId=id}

function render(){
 board.innerHTML="";

 COLS.forEach((c,i)=>{
 let col=document.createElement("div");
 col.className="col";

 col.ondragover=e=>e.preventDefault();

 col.ondrop=()=>{
  if(dragId){
   db.collection("kanban").doc(dragId).update({col:i});
   dragId=null;
  }
 };

 col.innerHTML=`<h3>${c}</h3>`;

 cards.filter(x=>x.col===i).forEach(x=>{
 col.innerHTML+=`
 <div class="card" draggable="true"
 ondragstart="drag('${x.id}')">
 <b>${x.text}</b><br>
 👤 ${x.responsable}<br>
 ⚡ ${x.prioridad}
 <br>
 <button onclick="editar('${x.id}','${x.text}','${x.prioridad}','${x.responsable}')">✏️</button>
 <button onclick="eliminar('${x.id}')">🗑️</button>
 </div>`;
 });

 board.appendChild(col);
 });

 dashboard();
}

// 📊 DASHBOARD + KPIs
function dashboard(){

 let total=cards.length;
 let terminadas=cards.filter(x=>x.col===3).length;
 let proceso=cards.filter(x=>x.col===1).length;

 document.getElementById("kpi1").innerText="Total tareas: "+total;
 document.getElementById("kpi2").innerText="% Terminadas: "+(total?(terminadas/total*100).toFixed(1):0)+"%";
 document.getElementById("kpi3").innerText="% En proceso: "+(total?(proceso/total*100).toFixed(1):0)+"%";
}

</script>
</body>
</html>
``
