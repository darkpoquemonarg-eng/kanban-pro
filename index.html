<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kanban Corporativo PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef1f5;padding:15px}
h2{text-align:center}

/* Dashboard */
.dashboard{
 display:flex;
 gap:20px;
 justify-content:center;
 flex-wrap:wrap;
}
.chart-box{
 width:350px;
 height:250px;
 background:white;
 padding:10px;
 border-radius:10px;
}

/* KPI */
.stats{
 display:flex;
 gap:10px;
 margin:15px 0;
}
.stat{
 background:white;
 flex:1;
 padding:10px;
 border-radius:8px;
 text-align:center;
 font-weight:bold;
}

/* Kanban */
.board{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
}
.col{
 background:white;
 padding:10px;
 border-radius:10px;
 min-height:250px;
}

.card{
 background:#fafafa;
 padding:8px;
 margin-bottom:6px;
 border-radius:6px;
 cursor:grab;
}
</style>
</head>

<body>

<h2>🚀 Kanban Corporativo PRO</h2>

<!-- FORM -->
<input id="tarea" placeholder="Tarea">
<select id="prioridad">
<option>Alta</option>
<option selected>Media</option>
<option>Baja</option>
</select>

<select id="responsable">
<option>Abel</option>
<option>Karla</option>
<option>Luis</option>
<option>Los 3</option>
<option>Abel y Karla</option>
<option>Luis y Abel</option>
<option>Luis y Karla</option>
</select>

<button onclick="crear()">Agregar</button>

<br><br>

<button onclick="exportHistorial()">📥 Movimientos</button>
<button onclick="exportActividades()">📊 Actividades</button>

<!-- DASHBOARD -->
<div class="dashboard">
<div class="chart-box"><canvas id="c1"></canvas></div>
<div class="chart-box"><canvas id="c2"></canvas></div>
</div>

<div class="stats" id="stats"></div>

<!-- TABLERO -->
<div class="board" id="board"></div>

<h3>Historial</h3>
<ul id="hist"></ul>

<script>

const config={
 apiKey:"AIzaSyASsFAKZ5t1YUylzLfQVuDtpzAWnAsCS8g",
 authDomain:"tablero-kamban.firebaseapp.com",
 projectId:"tablero-kamban"
};

firebase.initializeApp(config);
const db=firebase.firestore();

const COLS=["Pendiente","Proceso","Revision","Terminado"];

let cards=[];
let dragId=null;
let ch1,ch2;

// realtime
db.collection("kanban").onSnapshot(s=>{
 cards=[];
 s.forEach(d=>cards.push({id:d.id,...d.data()}));
 render();
});

db.collection("historial").orderBy("fecha","desc").onSnapshot(s=>{
 let h=document.getElementById("hist");
 h.innerHTML="";
 s.forEach(d=>{
  let x=d.data();
  h.innerHTML+=`<li>${x.action} - ${x.text}</li>`;
 });
});

// crear
function crear(){
 const t=document.getElementById("tarea").value;
 const p=document.getElementById("prioridad").value;
 const r=document.getElementById("responsable").value;

 if(!t) return;

 db.collection("kanban").add({text:t,prioridad:p,responsable:r,col:0,order:Date.now()});
 db.collection("actividades").add({text:t,prioridad:p,responsable:r,fecha:new Date()});

 log(t,"Creado");

 document.getElementById("tarea").value="";
}

// log
function log(t,a){
 db.collection("historial").add({text:t,action:a,fecha:new Date()});
}

// dashboard
function dashboard(){

 let alta=cards.filter(x=>x.prioridad==="Alta").length;
 let media=cards.filter(x=>x.prioridad==="Media").length;
 let baja=cards.filter(x=>x.prioridad==="Baja").length;

 let p=cards.filter(x=>x.col===0).length;
 let pr=cards.filter(x=>x.col===1).length;
 let r=cards.filter(x=>x.col===2).length;
 let t=cards.filter(x=>x.col===3).length;

 document.getElementById("stats").innerHTML=`
 <div class="stat">Total ${cards.length}</div>
 <div class="stat">🔴 ${alta}</div>
 <div class="stat">🟠 ${media}</div>
 <div class="stat">🟢 ${baja}</div>`;

 if(ch1)ch1.destroy();
 ch1=new Chart(c1,{
  type:"pie",
  data:{labels:["Alta","Media","Baja"],
  datasets:[{data:[alta,media,baja],
  backgroundColor:["red","orange","green"]}]},
  options:{responsive:true,maintainAspectRatio:false}
 });

 if(ch2)ch2.destroy();
 ch2=new Chart(c2,{
  type:"bar",
  data:{labels:["Pendiente","Proceso","Revision","Terminado"],
  datasets:[{data:[p,pr,r,t],backgroundColor:"#0078D4"}]},
  options:{responsive:true,maintainAspectRatio:false}
 });
}

// render con drag
function render(){

 dashboard();
 let b=document.getElementById("board");
 b.innerHTML="";

 COLS.forEach((c,i)=>{

 let col=document.createElement("div");
 col.className="col";

 col.ondragover=e=>e.preventDefault();

 col.ondrop=()=>{
  if(dragId){
   db.collection("kanban").doc(dragId).update({col:i});
   log("Movimiento","Cambio columna");
   dragId=null;
  }
 };

 col.innerHTML=`<h3>${c}</h3>`;

 cards.filter(x=>x.col===i).forEach(x=>{
 col.innerHTML+=`
 <div class="card"
 draggable="true"
 ondragstart="drag('${x.id}')"
 style="border-left:5px solid ${
  x.prioridad==="Alta"?"red":
  x.prioridad==="Media"?"orange":"green"
 }">
 ${x.text}<br>
 👤 ${x.responsable}<br>
 ⚡ ${x.prioridad}
 </div>`;
 });

 b.appendChild(col);
 });
}

// drag
function drag(id){
 dragId=id;
}

// excel
function exportHistorial(){
 db.collection("historial").get().then(s=>{
 let data=[["Acción","Detalle","Fecha"]];
 s.forEach(d=>{
  let x=d.data();
  data.push([x.action,x.text,new Date(x.fecha.seconds*1000)]);
 });
 let ws=XLSX.utils.aoa_to_sheet(data);
 let wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Movimientos");
 XLSX.writeFile(wb,"Historial.xlsx");
 });
}

function exportActividades(){
 db.collection("actividades").get().then(s=>{
 let data=[["Tarea","Prioridad","Responsable","Fecha"]];
 s.forEach(d=>{
  let x=d.data();
  data.push([x.text,x.prioridad,x.responsable,new Date(x.fecha.seconds*1000)]);
 });
 let ws=XLSX.utils.aoa_to_sheet(data);
 let wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Actividades");
 XLSX.writeFile(wb,"Actividades.xlsx");
 });
}

</script>
</body>
</html>
