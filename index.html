<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kanban Corporativo PRO</title>

<!-- ✅ SCRIPTS CORRECTOS -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef1f5;padding:15px}
h2{text-align:center}

.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.col{background:white;padding:10px;border-radius:10px;min-height:250px}

.card{
 background:#fafafa;
 padding:8px;
 margin:6px;
 border-radius:6px;
}

button{margin:3px;cursor:pointer}

.dashboard{display:flex;gap:15px;flex-wrap:wrap}

.chart-box{
 width:300px;height:220px;
 background:white;border-radius:10px;padding:10px
}
</style>
</head>

<body>

<h2>🚀 Kanban Corporativo PRO</h2>

<input id="tarea" placeholder="Nueva tarea">

<select id="prioridad">
<option>Alta</option>
<option selected>Media</option>
<option>Baja</option>
</select>

<select id="responsable">
<option>Abel</option>
<option>Karla</option>
<option>Luis</option>
</select>

<button onclick="crear()">Agregar</button>
<button onclick="limpiarBase()">🧹 Limpiar datos</button>

<!-- KPI -->
<h3>KPI Calidad</h3>
<p id="k1"></p>
<p id="k2"></p>
<p id="k3"></p>

<!-- DASHBOARD -->
<div class="dashboard">
 <div class="chart-box"><canvas id="c1"></canvas></div>
 <div class="chart-box"><canvas id="c2"></canvas></div>
</div>

<!-- TABLERO -->
<div id="board" class="board"></div>

<script>

// ✅ FIREBASE
const config={
 apiKey:"AIzaSyASsFAKZ5t1YUylzLfQVuDtpzAWnAsCS8g",
 authDomain:"tablero-kamban.firebaseapp.com",
 projectId:"tablero-kamban"
};

firebase.initializeApp(config);
const db=firebase.firestore();

let cards=[];
let ch1, ch2;

const COLS=["Pendiente","Proceso","Revision","Terminado"];

// ✅ LIMPIAR BASE (quita undefined)
function limpiarBase(){
 db.collection("kanban").get().then(s=>{
  s.forEach(doc=>{
   let d=doc.data();
   db.collection("kanban").doc(doc.id).update({
    text:d.text||"Tarea",
    prioridad:d.prioridad||"Media",
    responsable:d.responsable||"Sin asignar",
    col:d.col??0
   });
  });
  alert("Base limpiada ✅");
 });
}

// ✅ CARGA DE DATOS
db.collection("kanban").onSnapshot(s=>{
 cards=[];
 s.forEach(d=>{
  let x=d.data();

  cards.push({
   id:d.id,
   text:x.text||"Tarea",
   prioridad:x.prioridad||"Media",
   responsable:x.responsable||"Sin asignar",
   col:x.col??0
  });
 });

 render();
});

// ✅ CREAR
function crear(){
 if(!tarea.value){
  alert("Escribe una tarea");
  return;
 }

 db.collection("kanban").add({
  text:tarea.value,
  prioridad:prioridad.value,
  responsable:responsable.value,
  col:0
 });

 tarea.value="";
}

// ✅ ELIMINAR
function eliminar(id){
 if(confirm("Eliminar tarea?")){
  db.collection("kanban").doc(id).delete();
 }
}

// ✅ RENDER
function render(){

 board.innerHTML="";

 COLS.forEach((c,i)=>{
  let col=document.createElement("div");
  col.className="col";

  col.innerHTML=`<h3>${c}</h3>`;

  cards.filter(x=>x.col===i).forEach(x=>{

   col.innerHTML+=`
   <div class="card">
    <b>${x.text}</b><br>
    👤 ${x.responsable}<br>
    ⚡ ${x.prioridad}
    <br>
    <button onclick="eliminar('${x.id}')">🗑️</button>
   </div>
   `;
  });

  board.appendChild(col);
 });

 dashboard();
}

// ✅ DASHBOARD + KPI
function dashboard(){

 let total = cards.length;
 let terminadas = cards.filter(x=>x.col===3).length;
 let proceso = cards.filter(x=>x.col===1).length;

 document.getElementById("k1").innerText = "Total tareas: " + total;
 document.getElementById("k2").innerText = "% Terminadas: " + (total?(terminadas/total*100).toFixed(1):0)+"%";
 document.getElementById("k3").innerText = "% En proceso: " + (total?(proceso/total*100).toFixed(1):0)+"%";

 // PRIORIDAD
 let alta = cards.filter(x=>x.prioridad==="Alta").length;
 let media = cards.filter(x=>x.prioridad==="Media").length;
 let baja = cards.filter(x=>x.prioridad==="Baja").length;

 if(ch1) ch1.destroy();
 ch1 = new Chart(c1,{
  type:"pie",
  data:{
   labels:["Alta","Media","Baja"],
   datasets:[{
    data:[alta,media,baja],
    backgroundColor:["red","orange","green"]
   }]
  }
 });

 // ESTADO
 let p = cards.filter(x=>x.col===0).length;
 let pr = cards.filter(x=>x.col===1).length;
 let r = cards.filter(x=>x.col===2).length;
 let t = cards.filter(x=>x.col===3).length;

 if(ch2) ch2.destroy();
 ch2 = new Chart(c2,{
  type:"bar",
  data:{
   labels:COLS,
   datasets:[{
    label:"Tareas",
    data:[p,pr,r,t],
    backgroundColor:"#0078D4"
   }]
  }
 });

}

</script>

</body>
</html>
