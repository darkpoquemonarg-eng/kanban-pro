<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kanban Corporativo PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef1f5;padding:15px}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.col{background:#fff;padding:10px;border-radius:10px}
.card{background:#fafafa;padding:8px;margin-bottom:6px;border-radius:6px}
</style>
</head>

<body>

<h2>🚀 Kanban Corporativo PRO</h2>

<!-- FORMULARIO REAL -->
<input id="txtTarea" placeholder="Tarea">
<select id="selPrioridad">
  <option value="Alta">🔴 Alta</option>
  <option value="Media" selected>🟠 Media</option>
  <option value="Baja">🟢 Baja</option>
</select>
<button onclick="crear()">Agregar</button>

<h3>📊 Dashboard</h3>
<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>

<div id="stats"></div>

<div id="board" class="board"></div>

<script>

const firebaseConfig={
 apiKey:"AIzaSyASsFAKZ5t1YUylzLfQVuDtpzAWnAsCS8g",
 authDomain:"tablero-kamban.firebaseapp.com",
 projectId:"tablero-kamban"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const COLS=["Pendiente","Proceso","Revision","Terminado"];

let cards=[];
let chart1,chart2;

// 🔄 realtime
db.collection("kanban").onSnapshot(s=>{
 cards=[];
 s.forEach(d=>cards.push({id:d.id,...d.data()}));
 render();
});

// ✅ CREAR TAREA (sin errores)
function crear(){
 const text=document.getElementById("txtTarea").value;
 const prioridad=document.getElementById("selPrioridad").value;

 if(!text)return;

 db.collection("kanban").add({
  text,
  prioridad,
  col:0,
  order:Date.now()
 });

 document.getElementById("txtTarea").value="";
}

// ✅ KPI + DASHBOARD
function dashboard(){

 let alta=cards.filter(x=>x.prioridad==="Alta").length;
 let media=cards.filter(x=>x.prioridad==="Media").length;
 let baja=cards.filter(x=>x.prioridad==="Baja").length;

 let pendiente=cards.filter(x=>x.col===0).length;
 let proceso=cards.filter(x=>x.col===1).length;
 let revision=cards.filter(x=>x.col===2).length;
 let terminado=cards.filter(x=>x.col===3).length;

 // KPI texto
 document.getElementById("stats").innerHTML=`
 Total: ${cards.length} |
 🔴 ${alta} |
 🟠 ${media} |
 🟢 ${baja}
 `;

 // gráfica prioridad
 if(chart1)chart1.destroy();
 chart1=new Chart(chart1canvas,{
   type:"pie",
   data:{
     labels:["Alta","Media","Baja"],
     datasets:[{
       data:[alta,media,baja],
       backgroundColor:["red","orange","green"]
     }]
   }
 });

 // gráfica columnas
 if(chart2)chart2.destroy();
 chart2=new Chart(chart2canvas,{
   type:"bar",
   data:{
     labels:["Pendiente","Proceso","Revision","Terminado"],
     datasets:[{
       data:[pendiente,proceso,revision,terminado],
       backgroundColor:"blue"
     }]
   }
 });
}

// ✅ RENDER
function render(){

 dashboard();

 let html="";

 COLS.forEach((c,i)=>{

 html+=`<div class="col"><h3>${c}</h3>`;

 cards
 .filter(x=>x.col===i)
 .forEach(x=>{

 html+=`
 <div class="card" style="border-left:5px solid ${
   x.prioridad==="Alta"?"red":
   x.prioridad==="Media"?"orange":"green"
 }">
 ${x.text}<br>
 ${x.prioridad}
 </div>
 `;

 });

 html+=`</div>`;
 });

 document.getElementById("board").innerHTML=html;
}

</script>

</body>
</html>
