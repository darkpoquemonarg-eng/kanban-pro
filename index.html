<script>

const config={
 apiKey:"TU_API_KEY",
 authDomain:"tablero-kamban.firebaseapp.com",
 projectId:"tablero-kamban"
};

firebase.initializeApp(config);
const db=firebase.firestore();

let cards = [];
let dragId = null;

const COLS=["Pendiente","Proceso","Revision","Terminado"];

// 🔄 REALTIME
db.collection("kanban").onSnapshot(s=>{
 cards=[];
 s.forEach(d=>{
   let data = d.data();

   // ✅ FORZAR VALORES LIMPIOS
   cards.push({
     id:d.id,
     text:data.text,
     prioridad:data.prioridad || "Media",
     responsable:data.responsable || "Sin asignar",
     col:data.col ?? 0
   });
 });

 render();
});


// ✅ DRAG FUNCIONA SIEMPRE
function drag(id){
 dragId = id;
}


// ✅ RENDER CORREGIDO
function render(){

 let board = document.getElementById("board");
 board.innerHTML="";

 COLS.forEach((nombre,colIndex)=>{

 let column = document.createElement("div");
 column.className="col";

 // ✅ Permitir arrastrar
 column.ondragover = e => e.preventDefault();

 // ✅ SOLTAR TARJETA
 column.ondrop = ()=>{
   if(dragId){

     db.collection("kanban").doc(dragId).update({
       col: colIndex,
       order: Date.now()
     });

     dragId = null;
   }
 };

 column.innerHTML = `<h3>${nombre}</h3>`;

 // ✅ TARJETAS
 cards.filter(c=>c.col===colIndex).forEach(c=>{

 column.innerHTML += `
 <div class="card"
 draggable="true"
 ondragstart="drag('${c.id}')"
 style="border-left:5px solid ${
   c.prioridad==="Alta"?"red":
   c.prioridad==="Media"?"orange":"green"
 }">

 <b>${c.text}</b><br>

 👤 ${c.responsable}<br>

 ⚡ ${c.prioridad}

 </div>
 `;
 });

 board.appendChild(column);

 });

}


// ✅ CREAR TAREA (CORREGIDO)
function crear(){

 let text = document.getElementById("tarea").value;
 let prioridad = document.getElementById("prioridad").value;
 let responsable = document.getElementById("responsable").value;

 if(!text)return;

 db.collection("kanban").add({
   text,
   prioridad,
   responsable,
   col:0,
   order:Date.now()
 });

 document.getElementById("tarea").value="";
}

</script>
``
